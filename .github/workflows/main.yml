name: Wake Up Streamlit

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Run Inline Python Ping
        run: |
          python -c "
          import requests
          try:
              r = requests.get('https://nicolasrivollet.streamlit.app')
              print('Status:', r.status_code)
          except Exception as e:
              print(e)
          "
